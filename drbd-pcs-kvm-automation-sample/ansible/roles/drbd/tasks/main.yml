---
- name: Download the latest linbit-manage-node.py
  ansible.builtin.get_url:
    url: "{{ drbd_linbit_manage_node_script_url }}"
    dest: "{{ drbd_linbit_manage_node_script_path }}"
    mode: "0755"
  tags:
    - drbd
    - bootstrap

- name: Run linbit-manage-node.py non-interactively
  ansible.builtin.command:
    cmd: "python3 {{ drbd_linbit_manage_node_script_path }}"
    creates: "{{ drbd_linbit_registration_marker_path }}"
  environment:
    LB_USERNAME: "{{ linbit_username }}"
    LB_PASSWORD: "{{ linbit_password }}"
    LB_CLUSTER_ID: "{{ linbit_cluster_id }}"
  register: drbd_linbit_manage_node_result
  become: true
  tags:
    - drbd
    - bootstrap

- name: Create linbit registration marker
  ansible.builtin.file:
    path: "{{ drbd_linbit_registration_marker_path }}"
    state: touch
    owner: root
    group: root
    mode: "0644"
  when:
    - not ansible_check_mode
    - drbd_linbit_manage_node_result is changed
  become: true
  tags:
    - drbd
    - bootstrap

- name: Install DRBD utilities
  ansible.builtin.dnf:
    name: "{{ drbd_packages }}"
    state: present
  tags:
    - drbd
    - packages

- name: Create DRBD sysctl config
  ansible.builtin.copy:
    dest: "{{ drbd_sysctl_config_path }}"
    content: |
      net.core.rmem_max = {{ drbd_net_core_rmem_max }}
      net.core.wmem_max = {{ drbd_net_core_wmem_max }}
      net.ipv4.tcp_rmem = {{ drbd_net_ipv4_tcp_rmem }}
      net.core.rmem_default = {{ drbd_net_core_wmem_default }}
      net.core.wmem_default = {{ drbd_net_core_wmem_default }}
      net.core.netdev_max_backlog = {{ drbd_net_core_netdev_max_backlog }}
      net.core.default_qdisc = {{ drbd_net_core_default_qdisc }}
      net.ipv4.tcp_adv_win_scale = {{ drbd_net_ipv4_tcp_adv_win_scale }}
      net.ipv4.tcp_congestion_control = {{ drbd_net_ipv4_tcp_congestion_control }}
    owner: root
    group: root
    mode: "0644"
  notify: Apply drbd sysctl settings
  tags:
    - drbd
    - sysctl

- name: Load DRBD kernel module now
  ansible.builtin.command:
    cmd: modprobe drbd
    creates: /sys/module/drbd
  changed_when: true
  tags:
    - drbd
    - kernel

- name: Assert DRBD module is loaded
  ansible.builtin.command: lsmod
  register: drbd_lsmod_output
  changed_when: false
  tags:
    - drbd
    - kernel

- name: Assert DRBD module is present
  ansible.builtin.assert:
    that:
      - "'drbd' in drbd_lsmod_output.stdout"
    fail_msg: DRBD kernel module not loaded properly.
    success_msg: DRBD kernel module is loaded.
  tags:
    - drbd
    - kernel

- name: Comment out any existing DRBD mount entry in fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^\\s*([^\\s#]+)\\s+(/{{ drbd_mount_point | regex_escape }})\\s'
    replace: '# \1 \2  # commented out by Ansible DRBD role'
    backup: true
  tags:
    - drbd
    - storage

- name: Query DRBD port in runtime firewalld
  ansible.builtin.command: "firewall-cmd --query-port={{ drbd_port }}/tcp"
  register: drbd_firewall_runtime_query
  changed_when: false
  failed_when: false
  check_mode: false
  tags:
    - drbd
    - firewall

- name: Query DRBD port in permanent firewalld
  ansible.builtin.command: "firewall-cmd --permanent --query-port={{ drbd_port }}/tcp"
  register: drbd_firewall_permanent_query
  changed_when: false
  failed_when: false
  check_mode: false
  tags:
    - drbd
    - firewall

- name: Enable DRBD port in permanent firewalld
  ansible.builtin.command: "firewall-cmd --permanent --add-port={{ drbd_port }}/tcp"
  when:
    - drbd_firewall_permanent_query.rc != 0
    - not ansible_check_mode
  changed_when: true
  tags:
    - drbd
    - firewall

- name: Enable DRBD port in runtime firewalld
  ansible.builtin.command: "firewall-cmd --add-port={{ drbd_port }}/tcp"
  when:
    - drbd_firewall_runtime_query.rc != 0
    - not ansible_check_mode
  changed_when: true
  tags:
    - drbd
    - firewall

- name: Ensure DRBD config directory exists
  ansible.builtin.file:
    path: /etc/drbd.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags:
    - drbd
    - config

- name: Deploy DRBD resource config
  ansible.builtin.template:
    src: drbd_r0.res.j2
    dest: "/etc/drbd.d/{{ drbd_resource_name }}.res"
    owner: root
    group: root
    mode: "0644"
  notify: reload drbd config
  tags:
    - drbd
    - config

- name: Check whether DRBD resource is already active
  ansible.builtin.command:
    argv:
      - timeout
      - "{{ drbd_status_check_timeout_seconds | string }}"
      - drbdadm
      - status
      - "{{ drbd_resource_name }}"
  register: drbd_status_check
  changed_when: false
  failed_when: false
  check_mode: false
  when: drbd_bootstrap | bool
  tags:
    - drbd
    - bootstrap

- name: Check whether DRBD metadata exists
  ansible.builtin.command:
    argv:
      - timeout
      - "{{ drbd_metadata_check_timeout_seconds | string }}"
      - drbdadm
      - dump-md
      - "{{ drbd_resource_name }}"
  register: drbd_dump_md
  retries: "{{ drbd_metadata_check_retries }}"
  delay: "{{ drbd_metadata_check_delay }}"
  until:
    - drbd_dump_md.rc != 124
    - not (drbd_dump_md.stderr | default('') | regex_search('currently held by pid'))
  changed_when: false
  failed_when: false
  when:
    - drbd_bootstrap | bool
    - drbd_status_check.rc != 0
  tags:
    - drbd
    - bootstrap

- name: Fail when DRBD metadata probe stays locked
  ansible.builtin.fail:
    msg: >-
      DRBD metadata probe for {{ drbd_resource_name }} remained locked or timed out
      after {{ drbd_metadata_check_retries }} attempts.
      Last rc={{ drbd_dump_md.rc }}, stderr={{ drbd_dump_md.stderr | default('') }}
  when:
    - drbd_bootstrap | bool
    - drbd_status_check.rc != 0
    - drbd_dump_md is defined
    - drbd_dump_md.rc == 124 or (drbd_dump_md.stderr | default('') | regex_search('currently held by pid'))
  tags:
    - drbd
    - bootstrap

- name: Initialize DRBD metadata (create-md)
  ansible.builtin.command: "drbdadm create-md --force {{ drbd_resource_name }}"
  when:
    - drbd_bootstrap | bool
    - not ansible_check_mode
    - drbd_status_check.rc != 0
    - drbd_dump_md.rc != 0
    - drbd_dump_md.rc != 124
    - not (drbd_dump_md.stderr | default('') | regex_search('currently held by pid'))
  changed_when: true
  tags:
    - drbd
    - bootstrap

- name: Ensure DRBD instance service is enabled and started
  ansible.builtin.systemd_service:
    name: "drbd@{{ drbd_resource_name }}.target"
    enabled: true
    state: started
  tags:
    - drbd
    - service

- name: Bring up DRBD resource
  ansible.builtin.command: "drbdadm up {{ drbd_resource_name }}"
  when: drbd_bootstrap | bool
  register: drbd_up
  failed_when: drbd_up.rc not in [0, 1]
  changed_when: drbd_up.rc == 0
  tags:
    - drbd
    - bootstrap
