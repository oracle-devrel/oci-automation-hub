---
pcs_bootstrap_hosts_group: pcs_nodes
pcs_bootstrap_firewalld_service: high-availability

pcs_bootstrap_packages:
  - pcs
  - pacemaker
  - resource-agents
  - fence-agents-all
  - drbd-pacemaker

pcs_bootstrap_custom_ra_packages:
  - oraclelinux-developer-release-el9
  - python39-oci-cli

pcs_bootstrap_custom_ra_src: oci-dns-update
pcs_bootstrap_custom_ra_dest: /usr/lib/ocf/resource.d/heartbeat/oci-dns-update
