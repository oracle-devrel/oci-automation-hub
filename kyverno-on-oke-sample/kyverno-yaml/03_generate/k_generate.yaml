apiVersion: kyverno.io/v1
kind: ClusterPolicy 
metadata:
  name: sync-secrets
spec:
  rules:
  - name: sync-secret
    match:
      resources:
        kinds:
          - Namespace 
    generate:
      apiVersion: v1 
      kind: Secret 
      name: regcred
      namespace: "{{request.object.metadata.name}}"
      synchronize: true 
      clone:
        namespace: default
        name: regcred