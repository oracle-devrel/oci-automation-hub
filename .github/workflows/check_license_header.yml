# The Universal Permissive License (UPL), Version 1.0 as shown at https://oss.oracle.com/licenses/upl/

name: PR File Header Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-file-headers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check UPL license headers
        run: |
          CURRENT_YEAR=$(date +%Y)
          LINE1="# Copyright (c) 2024, ${CURRENT_YEAR}, Oracle and/or its affiliates. All rights reserved."
          LINE2="# The Universal Permissive License (UPL), Version 1.0 as shown at https://oss.oracle.com/licenses/upl/"

          # Get list of changed files in the PR
          CHANGED_FILES=$(git diff --name-only --diff-filter=d origin/${{ github.base_ref }}...HEAD)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No changed files found."
            exit 0
          fi

          FAILED=0

          for FILE in $CHANGED_FILES; do
            # Skip markdown files
            if [[ "$FILE" == *.md ]]; then
              echo "Skipping (markdown): $FILE"
              continue
            fi

            # Skip binary files or non-existent files
            if [ ! -f "$FILE" ] || ! file "$FILE" | grep -q text; then
              echo "Skipping (binary/missing): $FILE"
              continue
            fi

            if [[ "$FILE" == *.sh ]]; then
              SHEBANG=$(sed -n '1p' "$FILE")
              if [[ "$SHEBANG" != \#!* ]]; then
                echo "BAD - $FILE — missing shebang on line 1"
                FAILED=1
                continue
              fi
              ACTUAL_LINE1=$(sed -n '3p' "$FILE")
              ACTUAL_LINE2=$(sed -n '4p' "$FILE")
            else
              ACTUAL_LINE1=$(sed -n '1p' "$FILE")
              ACTUAL_LINE2=$(sed -n '2p' "$FILE")
            fi

            if [ "$ACTUAL_LINE1" = "$LINE1" ] && [ "$ACTUAL_LINE2" = "$LINE2" ]; then
              echo "GOOD - $FILE"
            else
              if [[ "$FILE" == *.sh ]]; then
                echo "BAD - $FILE — missing or incorrect UPL license header (expected on lines 3-4)"
              else
                echo "BAD - $FILE — missing or incorrect UPL license header"
              fi
              if [ "$ACTUAL_LINE1" != "$LINE1" ]; then
                echo "   Expected: $LINE1"
                echo "   Got:      $ACTUAL_LINE1"
              fi
              if [ "$ACTUAL_LINE2" != "$LINE2" ]; then
                echo "   Expected: $LINE2"
                echo "   Got:      $ACTUAL_LINE2"
              fi
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "::error::Some files are missing the required Oracle UPL license header."
            exit 1
          fi

          echo ""
          echo "All changed files contain the required UPL license header."
